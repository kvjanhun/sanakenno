# Nginx configuration for Sanakenno standalone.
#
# Serves the Vite-built frontend at /sanakenno-react/ and proxies
# API requests to the Hono container on port 8081.
#
# Include this in the main server block on the NUC:
#   include /path/to/sanakenno/nginx.conf;

# Static frontend assets
location /sanakenno-react/ {
    alias /var/www/sanakenno/dist/;
    try_files $uri $uri/ /sanakenno-react/index.html;

    # Cache static assets aggressively (hashed filenames)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API proxy to Hono container
location /sanakenno-react/api/ {
    rewrite ^/sanakenno-react/api/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Manifest and service worker (no aggressive caching)
location = /sanakenno-react/manifest.webmanifest {
    alias /var/www/sanakenno/dist/manifest.webmanifest;
    add_header Content-Type "application/manifest+json";
    expires 1h;
}

location = /sanakenno-react/sw.js {
    alias /var/www/sanakenno/dist/sw.js;
    add_header Cache-Control "no-cache";
}
