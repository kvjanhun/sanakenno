# Nginx location blocks for Sanakenno standalone.
#
# These blocks are added directly to erez.ac.conf in the HTTPS server block,
# before the catch-all location /. This file is kept as reference only.
#
# Static files served from /var/www/sanakenno/dist/ (owned by www-data).
# API proxied to Hono container on port 8081.

# API proxy to Hono container
location /sanakenno-react/api/ {
    rewrite ^/sanakenno-react/api/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# PWA service worker (must not be cached)
location = /sanakenno-react/sw.js {
    alias /var/www/sanakenno/dist/sw.js;
    add_header Cache-Control "no-cache";
}

# PWA manifest
location = /sanakenno-react/manifest.webmanifest {
    alias /var/www/sanakenno/dist/manifest.webmanifest;
    add_header Content-Type "application/manifest+json";
    expires 1h;
}

# Static frontend
location /sanakenno-react/ {
    alias /var/www/sanakenno/dist/;
    try_files $uri $uri/ /sanakenno-react/index.html;

    # Cache hashed assets aggressively
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
