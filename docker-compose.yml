services:
  sanakenno:
    build: .
    container_name: sanakenno
    restart: unless-stopped
    ports:
      - '8081:3001'
    volumes:
      - ./server/data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
      - TZ=Europe/Helsinki
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
        tag: 'sanakenno'
