name: CI — Mobile (iOS)

on:
  push:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - 'patches/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/mobile/**'
      - 'patches/**'
      - 'pnpm-lock.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: pnpm turbo run typecheck --filter=@sanakenno/mobile

      - name: Lint
        run: pnpm run lint
