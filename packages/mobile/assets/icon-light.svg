<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Hex gradient: warm orange with a subtle highlight -->
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#ff7b54"/>
      <stop offset="100%" stop-color="#e04a28"/>
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <!-- Subtle shadow for the hex -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Shadow hexagon (R=350, regular) -->
  <polygon
    points="512,162 815,337 815,687 512,862 209,687 209,337"
    fill="none"
    filter="url(#shadow)"
  />

  <!-- Main hexagon (R=340, regular) -->
  <polygon
    points="512,172 806,342 806,682 512,852 218,682 218,342"
    fill="url(#hexGrad)"
  />

  <!-- Subtle inner highlight (R=320, regular) -->
  <polygon
    points="512,192 789,352 789,672 512,832 235,672 235,352"
    fill="none"
    stroke="#ffffff18"
    stroke-width="3"
  />

  <!-- Letter S (optically centered) -->
  <text
    x="512"
    y="645"
    text-anchor="middle"
    font-size="400"
    font-family="-apple-system, 'SF Pro Rounded', 'Helvetica Neue', sans-serif"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="-10"
  >S</text>
</svg>
